<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NexChat">
<link rel="manifest" href="manifest.json">
<title>NexChat</title>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-primary: #0a0f1e;
    --bg-secondary: #111827;
    --bg-card: #1a2235;
    --bg-input: #1e2d44;
    --accent: #00d4ff;
    --accent-2: #7c3aed;
    --accent-glow: rgba(0, 212, 255, 0.15);
    --msg-out: #005c4b;
    --msg-in: #1a2235;
    --text-primary: #e8f4fd;
    --text-secondary: #8899aa;
    --text-muted: #4a5568;
    --border: rgba(0,212,255,0.12);
    --online: #22c55e;
    --danger: #ef4444;
    --radius: 16px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Sora', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
  }

  /* ─── NOISE TEXTURE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* ─── APP SHELL ─── */
  #app { position:relative; height:100vh; display:flex; flex-direction:column; z-index:1; }

  /* ─── SCREENS ─── */
  .screen { display:none; flex:1; flex-direction:column; height:100vh; }
  .screen.active { display:flex; }

  /* ─── AUTH SCREEN ─── */
  #authScreen {
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: radial-gradient(ellipse at 50% 0%, rgba(0,212,255,0.08) 0%, transparent 70%),
                radial-gradient(ellipse at 100% 100%, rgba(124,58,237,0.06) 0%, transparent 60%);
  }

  .auth-container {
    width: 100%;
    max-width: 400px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 32px;
    box-shadow: var(--shadow), 0 0 60px rgba(0,212,255,0.05);
    animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes slideUp {
    from { opacity:0; transform:translateY(30px) scale(0.96); }
    to { opacity:1; transform:translateY(0) scale(1); }
  }

  .auth-logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-radius: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 12px;
    box-shadow: 0 8px 24px rgba(0,212,255,0.3);
  }

  .auth-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .auth-title span { color: var(--accent); }
  .auth-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

  .auth-tabs {
    display: flex;
    background: var(--bg-input);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 24px;
  }

  .auth-tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    font-weight: 500;
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .auth-tab.active {
    background: var(--accent);
    color: var(--bg-primary);
    box-shadow: 0 4px 12px rgba(0,212,255,0.3);
  }

  .form-group { margin-bottom: 16px; }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }

  .form-input {
    width: 100%;
    padding: 14px 16px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text-primary);
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    outline: none;
    transition: all 0.2s;
  }

  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .form-input::placeholder { color: var(--text-muted); }

  .btn-primary {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--accent), #0099cc);
    border: none;
    border-radius: 12px;
    color: var(--bg-primary);
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    letter-spacing: 0.3px;
  }

  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,212,255,0.35); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .auth-error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    color: #fca5a5;
    margin-top: 12px;
    display: none;
  }

  /* ─── MAIN SCREEN ─── */
  #mainScreen { flex-direction: row; }

  /* ─── SIDEBAR ─── */
  .sidebar {
    width: 320px;
    min-width: 320px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: transform 0.3s ease;
  }

  .sidebar-header {
    padding: 20px 16px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card);
  }

  .sidebar-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .app-brand {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .app-brand span { color: var(--accent); }

  .header-actions { display:flex; gap:8px; }

  .icon-btn {
    width: 36px;
    height: 36px;
    border: none;
    background: var(--bg-input);
    color: var(--text-secondary);
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
  }

  .icon-btn:hover { background: var(--bg-card); color: var(--accent); }

  .current-user {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg-input);
    border-radius: 12px;
  }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
  }

  .avatar-sm { width:32px; height:32px; font-size:13px; }
  .avatar-lg { width:44px; height:44px; font-size:17px; }

  .user-info { flex:1; min-width:0; }
  .user-name { font-size: 14px; font-weight: 600; }
  .user-status { font-size: 11px; color: var(--online); font-weight: 500; }

  .search-box {
    position: relative;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .search-icon {
    position: absolute;
    left: 28px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
  }

  .search-input {
    width: 100%;
    padding: 10px 12px 10px 36px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-primary);
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }

  .users-list { flex:1; overflow-y:auto; padding:8px; }
  .users-list::-webkit-scrollbar { width:4px; }
  .users-list::-webkit-scrollbar-track { background:transparent; }
  .users-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    padding: 12px 8px 6px;
  }

  .user-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .user-item:hover { background: var(--bg-card); }
  .user-item.active { background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.15); }

  .user-item-info { flex:1; min-width:0; }
  .user-item-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .user-item-preview { font-size: 12px; color: var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .user-item-meta { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
  .user-item-time { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

  .badge {
    background: var(--accent);
    color: var(--bg-primary);
    font-size: 11px;
    font-weight: 700;
    min-width: 20px;
    height: 20px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 6px;
  }

  .online-dot {
    width: 10px;
    height: 10px;
    background: var(--online);
    border-radius: 50%;
    border: 2px solid var(--bg-secondary);
    position: absolute;
    bottom: 10px;
    left: 38px;
  }

  /* ─── CHAT AREA ─── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg-primary);
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-muted);
  }

  .empty-icon {
    font-size: 56px;
    opacity: 0.4;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%,100% { transform:translateY(0); }
    50% { transform:translateY(-8px); }
  }

  .empty-state h3 { font-size: 18px; color: var(--text-secondary); }
  .empty-state p { font-size: 13px; text-align:center; max-width:240px; line-height:1.5; }

  /* ─── CHAT VIEW ─── */
  .chat-view { display:none; flex:1; flex-direction:column; min-height:0; }
  .chat-view.active { display:flex; }

  .chat-header {
    padding: 14px 20px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    backdrop-filter: blur(10px);
  }

  .back-btn {
    display: none;
    width: 36px;
    height: 36px;
    border: none;
    background: var(--bg-input);
    color: var(--text-primary);
    border-radius: 10px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .chat-partner { flex:1; min-width:0; }
  .chat-partner-name { font-size:16px; font-weight:700; }
  .chat-partner-status { font-size:12px; color:var(--online); }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: repeating-linear-gradient(
      135deg,
      transparent 0px,
      transparent 40px,
      rgba(255,255,255,0.005) 40px,
      rgba(255,255,255,0.005) 80px
    );
  }

  .chat-messages::-webkit-scrollbar { width:4px; }
  .chat-messages::-webkit-scrollbar-track { background:transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

  .msg-bubble {
    max-width: 72%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
    animation: msgIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
  }

  @keyframes msgIn {
    from { opacity:0; transform:scale(0.88) translateY(8px); }
    to { opacity:1; transform:scale(1) translateY(0); }
  }

  .msg-out {
    background: var(--msg-out);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .msg-in {
    background: var(--msg-in);
    border: 1px solid var(--border);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .msg-time {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 4px;
    text-align: right;
  }

  .msg-in .msg-time { text-align:left; }

  .date-divider {
    text-align: center;
    margin: 16px 0 8px;
  }

  .date-divider span {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 11px;
    color: var(--text-secondary);
  }

  /* ─── CHAT INPUT ─── */
  .chat-input-area {
    padding: 12px 16px;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }

  .msg-input-wrapper {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    align-items: center;
    padding: 0 14px;
    transition: border-color 0.2s;
  }

  .msg-input-wrapper:focus-within { border-color: var(--accent); }

  #msgInput {
    flex:1;
    padding: 12px 0;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    resize: none;
    max-height: 120px;
    min-height: 24px;
    line-height: 1.5;
  }

  #msgInput::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 46px;
    height: 46px;
    background: linear-gradient(135deg, var(--accent), #0099cc);
    border: none;
    border-radius: 14px;
    color: var(--bg-primary);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(0,212,255,0.4); }
  .send-btn:active { transform: scale(0.96); }

  /* ─── TYPING INDICATOR ─── */
  .typing-indicator {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: var(--msg-in);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    animation: msgIn 0.2s ease;
  }

  .typing-indicator.show { display:flex; }
  .typing-dot { width:6px; height:6px; background:var(--text-secondary); border-radius:50%; animation: typingBounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%,60%,100% { transform:translateY(0); }
    30% { transform:translateY(-6px); }
  }

  /* ─── NOTIFICATION TOAST ─── */
  .notif-container {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }

  .notif-toast {
    background: var(--bg-card);
    border: 1px solid var(--accent);
    border-radius: 16px;
    padding: 14px 16px;
    min-width: 280px;
    max-width: 340px;
    box-shadow: var(--shadow), 0 0 20px rgba(0,212,255,0.15);
    display: flex;
    align-items: center;
    gap: 12px;
    pointer-events: all;
    cursor: pointer;
    animation: toastIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    overflow: hidden;
  }

  @keyframes toastIn {
    from { opacity:0; transform:translateX(100%) scale(0.9); }
    to { opacity:1; transform:translateX(0) scale(1); }
  }

  @keyframes toastOut {
    to { opacity:0; transform:translateX(110%); }
  }

  .notif-toast.removing { animation: toastOut 0.25s ease forwards; }

  .notif-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    background: var(--accent);
    border-radius: 0 0 0 16px;
    animation: progressBar 4s linear forwards;
  }

  @keyframes progressBar {
    from { width: 100%; }
    to { width: 0%; }
  }

  .notif-icon { font-size: 24px; flex-shrink: 0; }
  .notif-body { flex:1; min-width:0; }
  .notif-title { font-size: 13px; font-weight: 700; color: var(--accent); }
  .notif-msg { font-size: 13px; color: var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* ─── NOTIF PERMISSION BANNER ─── */
  .notif-banner {
    background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(124,58,237,0.1));
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 12px;
    padding: 12px 16px;
    margin: 8px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .notif-banner button {
    margin-left: auto;
    padding: 6px 14px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: var(--bg-primary);
    font-family: 'Sora', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* ─── MOBILE RESPONSIVE ─── */
  @media (max-width: 768px) {
    .sidebar {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      width: 100%;
      min-width: unset;
      transform: translateX(0);
    }

    .sidebar.hidden { transform: translateX(-100%); }

    .chat-area {
      position: absolute;
      inset: 0;
      display: none;
    }

    .chat-area.mobile-active { display:flex; }
    .back-btn { display:flex !important; }
    .empty-state { display:none; }
  }

  /* ─── LOADING ─── */
  .loading-screen {
    position: fixed;
    inset: 0;
    background: var(--bg-primary);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 9998;
    transition: opacity 0.4s;
  }

  .loading-screen.hidden { opacity:0; pointer-events:none; }

  .loading-logo {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 40px rgba(0,212,255,0.3);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 40px rgba(0,212,255,0.3); }
    50% { box-shadow: 0 0 60px rgba(0,212,255,0.6); }
  }

  .loading-text { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .loading-text span { color: var(--accent); }
  .loading-sub { font-size: 13px; color: var(--text-muted); }

  /* Color palettes for avatars */
  .av-0 { background: linear-gradient(135deg, #00d4ff, #0099cc); color: #000; }
  .av-1 { background: linear-gradient(135deg, #7c3aed, #5b21b6); color: #fff; }
  .av-2 { background: linear-gradient(135deg, #f59e0b, #d97706); color: #000; }
  .av-3 { background: linear-gradient(135deg, #10b981, #059669); color: #fff; }
  .av-4 { background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; }
  .av-5 { background: linear-gradient(135deg, #ec4899, #db2777); color: #fff; }
</style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">💬</div>
  <div class="loading-text">Nex<span>Chat</span></div>
  <div class="loading-sub">Connecting...</div>
</div>

<!-- Notification Container -->
<div class="notif-container" id="notifContainer"></div>

<div id="app">

  <!-- ─── AUTH SCREEN ─── -->
  <div id="authScreen" class="screen active">
    <div class="auth-container">
      <div class="auth-logo">
        <div class="logo-icon">💬</div>
        <div class="auth-title">Nex<span>Chat</span></div>
        <div class="auth-subtitle">Real-time messaging, everywhere</div>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" onclick="switchTab('register')">Register</button>
      </div>

      <div id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="loginEmail" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" onkeypress="if(event.key==='Enter')doLogin()">
        </div>
        <button class="btn-primary" id="loginBtn" onclick="doLogin()">Sign In →</button>
      </div>

      <div id="registerForm" style="display:none">
        <div class="form-group">
          <label class="form-label">Display Name</label>
          <input class="form-input" type="text" id="regName" placeholder="Your name">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="regEmail" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="regPassword" placeholder="Min 6 characters" onkeypress="if(event.key==='Enter')doRegister()">
        </div>
        <button class="btn-primary" id="registerBtn" onclick="doRegister()">Create Account →</button>
      </div>

      <div class="auth-error" id="authError"></div>
    </div>
  </div>

  <!-- ─── MAIN SCREEN ─── -->
  <div id="mainScreen" class="screen">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-top">
          <div class="app-brand">Nex<span>Chat</span></div>
          <div class="header-actions">
            <button class="icon-btn" onclick="doLogout()" title="Logout">🚪</button>
          </div>
        </div>
        <div class="current-user" id="currentUserBar">
          <div class="avatar avatar-sm av-0" id="myAvatarSidebar">?</div>
          <div class="user-info">
            <div class="user-name" id="myNameSidebar">Loading...</div>
            <div class="user-status">● Online</div>
          </div>
        </div>
      </div>

      <div id="notifBanner" class="notif-banner" style="display:none">
        🔔 Enable notifications to get messages
        <button onclick="requestNotifPermission()">Enable</button>
      </div>

      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="search" placeholder="Search users..." oninput="filterUsers(this.value)" id="searchInput">
      </div>

      <div class="users-list" id="usersList">
        <div class="section-label">All Users</div>
        <div id="usersContainer" style="color:var(--text-muted);font-size:13px;padding:16px;text-align:center;">Loading users...</div>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">

      <!-- Empty State -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">💬</div>
        <h3>Select a conversation</h3>
        <p>Choose a user from the sidebar to start chatting</p>
      </div>

      <!-- Chat View -->
      <div class="chat-view" id="chatView">
        <div class="chat-header">
          <button class="back-btn" id="backBtn" onclick="closeMobileChat()">←</button>
          <div class="avatar av-1" id="chatPartnerAvatar" style="width:40px;height:40px;font-size:16px;">?</div>
          <div class="chat-partner">
            <div class="chat-partner-name" id="chatPartnerName">-</div>
            <div class="chat-partner-status" id="chatPartnerStatus">● Online</div>
          </div>
        </div>

        <div class="chat-messages" id="chatMessages">
          <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>

        <div class="chat-input-area">
          <div class="msg-input-wrapper">
            <textarea id="msgInput" rows="1" placeholder="Type a message..." 
              oninput="autoResize(this);handleTyping()" 
              onkeypress="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
            ></textarea>
          </div>
          <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ══════════════════════════════════════════════════
//  FIREBASE CONFIG — REPLACE WITH YOUR VALUES
// ══════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAESFTk5Gkv5GgVRAccveE6sS9u_YJLpec",
  authDomain: "chatapp-web-c7775.firebaseapp.com",
  databaseURL: "https://chatapp-web-c7775-default-rtdb.firebaseio.com",
  projectId: "chatapp-web-c7775",
  storageBucket: "chatapp-web-c7775.firebasestorage.app",
  messagingSenderId: "937393424296",
  appId: "1:937393424296:web:d29c4d208cda4011903f9d",
  measurementId: "G-XZ2X7GT0ZD"
};

const VAPID_KEY = "BJtw8Hc1sW3mdOmtdVOnGqw5PFeIj448DJOHntQ1bF-ORn4Z3p3ruknMW78qb-rbSts9mb1q63st9Asp4SmZfoo";

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.database();
let messaging = null;

try {
  messaging = firebase.messaging();
} catch(e) {
  console.warn('FCM not supported:', e);
}

// ── State ──
let currentUser = null;
let currentChatUID = null;
let allUsers = {};
let unreadCounts = {};
let msgListeners = {};
let typingTimeout = null;
let isTyping = false;

// ── Avatar colors ──
const AV_COLORS = ['av-0','av-1','av-2','av-3','av-4','av-5'];
function getAvatarClass(uid) {
  let hash = 0;
  for(let c of uid) hash = (hash*31 + c.charCodeAt(0)) & 0xffffffff;
  return AV_COLORS[Math.abs(hash) % AV_COLORS.length];
}
function getInitials(name) {
  return name ? name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?';
}

// ══════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'?i===0:i===1)));
  document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
  document.getElementById('registerForm').style.display = tab==='register'?'block':'none';
  hideError();
}

function showError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError() {
  document.getElementById('authError').style.display = 'none';
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPassword').value;
  if(!email||!pass) return showError('Please fill all fields');
  
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    showError(e.message);
    btn.disabled = false; btn.textContent = 'Sign In →';
  }
}

async function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPassword').value;
  if(!name||!email||!pass) return showError('Please fill all fields');
  if(pass.length < 6) return showError('Password must be at least 6 characters');
  
  const btn = document.getElementById('registerBtn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await cred.user.updateProfile({ displayName: name });
    await db.ref(`users/${cred.user.uid}`).set({
      name, email,
      createdAt: Date.now(),
      online: true,
      lastSeen: Date.now()
    });
  } catch(e) {
    showError(e.message);
    btn.disabled = false; btn.textContent = 'Create Account →';
  }
}

async function doLogout() {
  if(!confirm('Logout from NexChat?')) return;
  
  if(currentUser) {
    // Remove FCM token on logout (Case 4: no notifications after logout)
    await db.ref(`users/${currentUser.uid}/fcmToken`).remove();
    await db.ref(`users/${currentUser.uid}/online`).set(false);
    await db.ref(`users/${currentUser.uid}/lastSeen`).set(Date.now());
  }
  
  Object.values(msgListeners).forEach(off => off());
  msgListeners = {};
  currentChatUID = null;
  
  await auth.signOut();
}

// ══════════════════════════════════════════════════
//  AUTH STATE OBSERVER
// ══════════════════════════════════════════════════
auth.onAuthStateChanged(async user => {
  if(user) {
    currentUser = user;
    
    // Ensure user profile exists
    const snap = await db.ref(`users/${user.uid}`).get();
    if(!snap.exists()) {
      await db.ref(`users/${user.uid}`).set({
        name: user.displayName || user.email.split('@')[0],
        email: user.email,
        createdAt: Date.now(),
        online: true,
        lastSeen: Date.now()
      });
    } else {
      await db.ref(`users/${user.uid}/online`).set(true);
      await db.ref(`users/${user.uid}/lastSeen`).set(Date.now());
    }

    // Set offline on disconnect
    db.ref(`users/${user.uid}/online`).onDisconnect().set(false);
    db.ref(`users/${user.uid}/lastSeen`).onDisconnect().set(Date.now());
    
    showMainScreen();
    await setupFCM();
    loadUsers();
    listenForIncomingMessages();
    
  } else {
    currentUser = null;
    showAuthScreen();
  }
  
  hideLoadingScreen();
});

// ══════════════════════════════════════════════════
//  SCREEN TRANSITIONS
// ══════════════════════════════════════════════════
function showAuthScreen() {
  document.getElementById('authScreen').classList.add('active');
  document.getElementById('mainScreen').classList.remove('active');
}

function showMainScreen() {
  document.getElementById('authScreen').classList.remove('active');
  document.getElementById('mainScreen').classList.add('active');
  
  const name = currentUser.displayName || currentUser.email.split('@')[0];
  const av = getAvatarClass(currentUser.uid);
  document.getElementById('myNameSidebar').textContent = name;
  const avEl = document.getElementById('myAvatarSidebar');
  avEl.textContent = getInitials(name);
  avEl.className = `avatar avatar-sm ${av}`;
}

function hideLoadingScreen() {
  setTimeout(() => {
    document.getElementById('loadingScreen').classList.add('hidden');
  }, 600);
}

// ══════════════════════════════════════════════════
//  FCM SETUP
// ══════════════════════════════════════════════════
async function setupFCM() {
  if(!messaging) return;
  
  if(Notification.permission === 'default') {
    document.getElementById('notifBanner').style.display = 'flex';
  } else if(Notification.permission === 'granted') {
    await registerFCMToken();
  }
  
  // Foreground message handler
  messaging.onMessage(payload => {
    console.log('Foreground FCM:', payload);
    const data = payload.data || {};
    
    // Case 1: If viewing same chat — no notification
    if(currentChatUID && data.senderId === currentChatUID) return;
    
    // Case 2: Logged in, different screen — show in-app toast
    showToast(data.senderName || 'Someone', data.body || 'New message', data.senderId);
    playNotifSound();
  });

  // Handle notification click from SW (Case 3: app was killed)
  navigator.serviceWorker?.addEventListener('message', event => {
    if(event.data?.type === 'OPEN_CHAT') {
      openChatByUID(event.data.senderId);
    }
  });
}

async function requestNotifPermission() {
  const perm = await Notification.requestPermission();
  document.getElementById('notifBanner').style.display = 'none';
  if(perm === 'granted') {
    await registerFCMToken();
    showToast('NexChat', 'Notifications enabled! 🔔', null);
  }
}

async function registerFCMToken() {
  if(!messaging || !currentUser) return;
  try {
    // Register service worker first
    if('serviceWorker' in navigator) {
      await navigator.serviceWorker.register('firebase-messaging-sw.js');
    }
    const token = await messaging.getToken({ vapidKey: VAPID_KEY });
    if(token) {
      await db.ref(`users/${currentUser.uid}/fcmToken`).set(token);
      console.log('FCM token saved');
    }
  } catch(e) {
    console.warn('FCM token error:', e);
  }
}

// ══════════════════════════════════════════════════
//  USERS LIST
// ══════════════════════════════════════════════════
function loadUsers() {
  db.ref('users').on('value', snap => {
    allUsers = {};
    const container = document.getElementById('usersContainer');
    container.innerHTML = '';
    
    const users = snap.val() || {};
    const others = Object.entries(users).filter(([uid]) => uid !== currentUser?.uid);
    
    if(others.length === 0) {
      container.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:16px;text-align:center;">No other users yet.<br>Register another account to chat!</div>';
      return;
    }
    
    others.forEach(([uid, data]) => {
      allUsers[uid] = data;
      renderUserItem(uid, data, container);
    });
    
    listenForLastMessages();
  });
}

function renderUserItem(uid, data, container) {
  const existing = document.getElementById(`user-item-${uid}`);
  if(existing) return; // Already rendered, will be updated by last message listener
  
  const avClass = getAvatarClass(uid);
  const initials = getInitials(data.name);
  const isOnline = data.online === true;
  
  const el = document.createElement('div');
  el.className = `user-item${currentChatUID === uid ? ' active' : ''}`;
  el.id = `user-item-${uid}`;
  el.onclick = () => openChat(uid, data);
  el.innerHTML = `
    <div class="avatar ${avClass}" style="width:44px;height:44px;font-size:16px;">${initials}</div>
    ${isOnline ? '<div class="online-dot"></div>' : ''}
    <div class="user-item-info">
      <div class="user-item-name">${escHtml(data.name)}</div>
      <div class="user-item-preview" id="preview-${uid}">Tap to chat</div>
    </div>
    <div class="user-item-meta">
      <div class="user-item-time" id="time-${uid}"></div>
      <div id="badge-${uid}"></div>
    </div>
  `;
  container.appendChild(el);
}

function filterUsers(query) {
  document.querySelectorAll('.user-item').forEach(el => {
    const name = el.querySelector('.user-item-name')?.textContent.toLowerCase() || '';
    el.style.display = name.includes(query.toLowerCase()) ? '' : 'none';
  });
}

function listenForLastMessages() {
  Object.keys(allUsers).forEach(uid => {
    const chatId = getChatId(uid);
    if(msgListeners[`last_${uid}`]) return;
    
    msgListeners[`last_${uid}`] = db.ref(`messages/${chatId}`).limitToLast(1).on('value', snap => {
      if(!snap.exists()) return;
      snap.forEach(child => {
        const msg = child.val();
        const previewEl = document.getElementById(`preview-${uid}`);
        const timeEl = document.getElementById(`time-${uid}`);
        if(previewEl) {
          const isOut = msg.senderId === currentUser?.uid;
          previewEl.textContent = (isOut ? 'You: ' : '') + msg.text;
        }
        if(timeEl) timeEl.textContent = formatTime(msg.timestamp);
        
        // Show unread badge if not current chat
        if(msg.senderId === uid && uid !== currentChatUID && !msg.readBy?.[currentUser?.uid]) {
          unreadCounts[uid] = (unreadCounts[uid] || 0) + 1;
          const badgeEl = document.getElementById(`badge-${uid}`);
          if(badgeEl) badgeEl.innerHTML = `<div class="badge">${Math.min(unreadCounts[uid], 99)}</div>`;
        }
      });
    });
  });
}

// ══════════════════════════════════════════════════
//  OPEN CHAT
// ══════════════════════════════════════════════════
function openChat(uid, userData) {
  if(currentChatUID === uid) return;
  
  // Clear unread
  unreadCounts[uid] = 0;
  const badgeEl = document.getElementById(`badge-${uid}`);
  if(badgeEl) badgeEl.innerHTML = '';
  
  // Update active state
  document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById(`user-item-${uid}`);
  if(item) item.classList.add('active');
  
  currentChatUID = uid;
  
  // Set header
  const avClass = getAvatarClass(uid);
  const partnerAvEl = document.getElementById('chatPartnerAvatar');
  partnerAvEl.textContent = getInitials(userData.name);
  partnerAvEl.className = `avatar ${avClass}`;
  partnerAvEl.style.cssText = 'width:40px;height:40px;font-size:16px;';
  document.getElementById('chatPartnerName').textContent = userData.name;
  document.getElementById('chatPartnerStatus').textContent = userData.online ? '● Online' : '● Offline';
  
  // Show chat
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('chatView').classList.add('active');
  
  // Mobile
  const sidebar = document.getElementById('sidebar');
  const chatArea = document.getElementById('chatArea');
  if(window.innerWidth <= 768) {
    sidebar.classList.add('hidden');
    chatArea.classList.add('mobile-active');
  }
  
  loadMessages(uid);
  markMessagesRead(uid);
  
  // Listen to partner's online status
  db.ref(`users/${uid}/online`).on('value', snap => {
    document.getElementById('chatPartnerStatus').textContent = snap.val() ? '● Online' : '● Offline';
  });
  
  // Listen to typing
  db.ref(`typing/${getChatId(uid)}/${uid}`).on('value', snap => {
    document.getElementById('typingIndicator').classList.toggle('show', snap.val() === true);
  });
  
  document.getElementById('msgInput').focus();
}

function openChatByUID(uid) {
  if(!uid || !allUsers[uid]) return;
  openChat(uid, allUsers[uid]);
}

function closeMobileChat() {
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('chatArea').classList.remove('mobile-active');
  document.getElementById('chatView').classList.remove('active');
  document.getElementById('emptyState').style.display = 'flex';
  currentChatUID = null;
}

// ══════════════════════════════════════════════════
//  MESSAGES
// ══════════════════════════════════════════════════
function getChatId(partnerUID) {
  const uids = [currentUser.uid, partnerUID].sort();
  return `${uids[0]}_${uids[1]}`;
}

function loadMessages(partnerUID) {
  const container = document.getElementById('chatMessages');
  container.innerHTML = `
    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  `;
  
  const chatId = getChatId(partnerUID);
  
  if(msgListeners[`chat_${chatId}`]) {
    msgListeners[`chat_${chatId}`]();
  }
  
  let lastDate = null;
  
  msgListeners[`chat_${chatId}`] = db.ref(`messages/${chatId}`).orderByChild('timestamp').on('child_added', snap => {
    const msg = snap.val();
    const msgDate = new Date(msg.timestamp).toDateString();
    
    if(msgDate !== lastDate) {
      lastDate = msgDate;
      const divider = document.createElement('div');
      divider.className = 'date-divider';
      divider.innerHTML = `<span>${formatDate(msg.timestamp)}</span>`;
      const typing = document.getElementById('typingIndicator');
      container.insertBefore(divider, typing);
    }
    
    const isOut = msg.senderId === currentUser.uid;
    const el = document.createElement('div');
    el.className = `msg-bubble ${isOut ? 'msg-out' : 'msg-in'}`;
    el.innerHTML = `${escHtml(msg.text)}<div class="msg-time">${formatTime(msg.timestamp)}${isOut ? ' ✓✓' : ''}</div>`;
    
    const typing = document.getElementById('typingIndicator');
    container.insertBefore(el, typing);
    container.scrollTop = container.scrollHeight;
  });
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if(!text || !currentChatUID) return;
  
  input.value = '';
  autoResize(input);
  stopTyping();
  
  const chatId = getChatId(currentChatUID);
  const msgRef = db.ref(`messages/${chatId}`).push();
  
  const msg = {
    id: msgRef.key,
    senderId: currentUser.uid,
    receiverId: currentChatUID,
    text,
    timestamp: Date.now(),
    readBy: { [currentUser.uid]: true }
  };
  
  await msgRef.set(msg);
  
  // Send push notification to receiver (handled via Firebase function or direct)
  sendPushNotification(currentChatUID, text);
}

async function sendPushNotification(receiverUID, text) {
  // Get receiver's FCM token
  const tokenSnap = await db.ref(`users/${receiverUID}/fcmToken`).get();
  const token = tokenSnap.val();
  
  if(!token) return; // User logged out or no token (Case 4 handled)
  
  // Check if receiver is online and viewing this chat — handled by FCM in foreground
  // This just writes to a "pending notifications" node that a Cloud Function or your own server picks up
  // For demo without server: write notification data to DB, client reads it
  
  const notifRef = db.ref(`notifications/${receiverUID}`).push();
  await notifRef.set({
    type: 'message',
    senderId: currentUser.uid,
    senderName: currentUser.displayName || currentUser.email.split('@')[0],
    body: text,
    timestamp: Date.now(),
    chatId: getChatId(receiverUID),
    read: false
  });
}

function listenForIncomingMessages() {
  // Listen to notification node for this user
  db.ref(`notifications/${currentUser?.uid}`).on('child_added', snap => {
    const notif = snap.val();
    if(!notif || notif.read) return;
    
    // Mark read
    snap.ref.update({ read: true });
    
    const { senderId, senderName, body } = notif;
    
    // Case 1: Viewing same chat — no notification, message already shows in real-time
    if(currentChatUID === senderId) return;
    
    // Case 2: Logged in, different screen — show toast
    showToast(senderName || 'Someone', body, senderId);
    playNotifSound();
    
    // Browser notification if permitted
    if(Notification.permission === 'granted') {
      const n = new Notification(`💬 ${senderName}`, {
        body: body,
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="%2300d4ff"/><text y=".9em" font-size="80" x="10">💬</text></svg>',
        tag: `chat-${senderId}`
      });
      n.onclick = () => { window.focus(); openChatByUID(senderId); n.close(); };
    }
  });
}

function markMessagesRead(partnerUID) {
  const chatId = getChatId(partnerUID);
  db.ref(`messages/${chatId}`).orderByChild('senderId').equalTo(partnerUID).once('value', snap => {
    snap.forEach(child => {
      if(!child.val().readBy?.[currentUser.uid]) {
        child.ref.child(`readBy/${currentUser.uid}`).set(true);
      }
    });
  });
}

// ══════════════════════════════════════════════════
//  TYPING INDICATOR
// ══════════════════════════════════════════════════
function handleTyping() {
  if(!currentChatUID) return;
  
  if(!isTyping) {
    isTyping = true;
    db.ref(`typing/${getChatId(currentChatUID)}/${currentUser.uid}`).set(true);
  }
  
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(stopTyping, 2000);
}

function stopTyping() {
  if(!currentChatUID || !isTyping) return;
  isTyping = false;
  db.ref(`typing/${getChatId(currentChatUID)}/${currentUser.uid}`).set(false);
}

// ══════════════════════════════════════════════════
//  TOAST NOTIFICATIONS
// ══════════════════════════════════════════════════
function showToast(title, message, senderId) {
  const container = document.getElementById('notifContainer');
  const toast = document.createElement('div');
  toast.className = 'notif-toast';
  toast.innerHTML = `
    <div class="notif-icon">💬</div>
    <div class="notif-body">
      <div class="notif-title">${escHtml(title)}</div>
      <div class="notif-msg">${escHtml(message)}</div>
    </div>
    <div class="notif-progress"></div>
  `;
  
  if(senderId) {
    toast.onclick = () => {
      removeToast(toast);
      openChatByUID(senderId);
    };
  }
  
  container.appendChild(toast);
  
  setTimeout(() => removeToast(toast), 4000);
}

function removeToast(toast) {
  toast.classList.add('removing');
  setTimeout(() => toast.remove(), 300);
}

// ══════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function formatTime(ts) {
  return new Date(ts).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12: true });
}

function formatDate(ts) {
  const d = new Date(ts);
  const today = new Date();
  const yesterday = new Date(today);
  yesterday.setDate(today.getDate() - 1);
  
  if(d.toDateString() === today.toDateString()) return 'Today';
  if(d.toDateString() === yesterday.toDateString()) return 'Yesterday';
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let audioCtx = null;
function playNotifSound() {
  try {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
  } catch(e) {}
}

// ══════════════════════════════════════════════════
//  VISIBILITY / ONLINE STATUS
// ══════════════════════════════════════════════════
document.addEventListener('visibilitychange', () => {
  if(!currentUser) return;
  const isVisible = document.visibilityState === 'visible';
  db.ref(`users/${currentUser.uid}/online`).set(isVisible);
});

window.addEventListener('beforeunload', () => {
  if(currentUser) {
    db.ref(`users/${currentUser.uid}/online`).set(false);
    if(isTyping && currentChatUID) {
      db.ref(`typing/${getChatId(currentChatUID)}/${currentUser.uid}`).set(false);
    }
  }
});
</script>
